- keyname: about
  field_type: author_bio
  name: About Old School RuneScape HiScores
  description: Shows Old School RuneScape HiScores with an overall rank headline and best-ranked categories. Supports regular players, solo Ironman variants, Deadman, and leagues.
  category: games,analytics
  learn_more_url: https://trmnl-runescape.maddy.tech
  github_url: https://github.com/Me4502/trmnl-runescape
  email_address: trmnl@madelinemiller.dev

- keyname: mode
  field_type: select
  name: HiScores mode
  description: Select which Old School HiScores mode to display.
  options:
    - Player: player
    - Ironman: ironman
    - Hardcore Ironman: hardcore_ironman
    - Ultimate Ironman: ultimate_ironman
    - Deadman Mode: deadman
    - Leagues: leagues
  default: player

- keyname: player_name
  field_type: text
  name: Old School name
  placeholder: Zezima
  description: Old School display name to look up on the HiScores.
  required: true

- keyname: instance_title
  field_type: string
  name: Display title
  default: Old School HiScores
  optional: true
